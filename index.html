<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Art Loop Popup</title>
<style>
body {
  font-family: Arial, sans-serif;
  text-align: center;
  margin-top: 100px;
  background-color: #f0f0f0;
}
.popup-bg {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.6);
  display: flex;
  justify-content: center; align-items: center;
  z-index: 1000;
}
.popup-content {
  background: #fff;
  padding: 30px;
  border-radius: 10px;
  box-shadow: 0 0 10px rgba(0,0,0,0.3);
  max-width: 400px;
}
button {
  background: #4285f4;
  border: none;
  color: #fff;
  padding: 10px 20px;
  margin: 10px;
  border-radius: 6px;
  cursor: pointer;
}
</style>
</head>
<body>

<h1>Welcome to the Art Page</h1>
<p>Click below to experience the popup.</p>
<button id="showPopup">Open Popup</button>

<div id="popup" class="popup-bg" style="display: none;">
  <div class="popup-content">
    <h2>You’re in the loop.</h2>
    <p>This popup is part of the art experience.</p>
    <button id="closePopup">Try to close</button>
  </div>
</div>

<script>
const popup = document.getElementById('popup');
const showBtn = document.getElementById('showPopup');
const closeBtn = document.getElementById('closePopup');

// open popup
showBtn.onclick = () => popup.style.display = 'flex';

// on "close", open same site in new tab and hide popup
closeBtn.onclick = () => {
  window.open(window.location.href, '_blank');
  popup.style.display = 'none';
};
</script>

</body>
</html>
