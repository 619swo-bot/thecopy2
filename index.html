<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Art Loop Popup</title>
<style>
body {
  font-family: Arial, sans-serif;
  text-align: center;
  margin: 100px 0;
  background: #fafafa;
}

/* popup background layer */
.popup-bg {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.6);
  justify-content: center; align-items: center;
  z-index: 1000;
}

/* popup box */
.popup-content {
  position: relative;
  background: #000;
  color: #fff;
  padding: 30px;
  border-radius: 10px;
  box-shadow: 0 0 10px rgba(0,0,0,0.3);
  max-width: 520px;
}

/* close "X" */
.close-btn {
  position: absolute;
  top: 10px;
  right: 15px;
  font-size: 22px;
  font-weight: bold;
  color: #aaa;
  cursor: pointer;
  transition: color 0.2s;
}
.close-btn:hover {
  color: #000;
}

/* rainbow animated text */
.rainbow-text {
  background: linear-gradient(90deg, red, orange, yellow, green, cyan, blue, violet);
  background-size: 400% 100%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: rainbowMove 4s linear infinite;
  font-weight: bold;
  font-size: 1.4em;
}
@keyframes rainbowMove {
  0% { background-position: 0% 50%; }
  100% { background-position: 100% 50%; }
}

/* green PLAY NOW button */
.play-now-btn {
  background: #28a745;
  color: #fff;
  border: none;
  padding: 12px 24px;
  font-size: 1em;
  font-weight: bold;
  border-radius: 6px;
  cursor: pointer;
  transition: background 0.25s;
  margin-top: 15px;
}
.play-now-btn:hover {
  background: #218838;
}
</style>
</head>
<body>

<h1>Welcome to the Art Popup</h1>
<p>This page opens the experience automatically.</p>

<div id="popup" class="popup-bg">
  <div class="popup-content">
    <span id="closePopup" class="close-btn">&times;</span>
    <h2 class="rainbow-text">!!99% OF PEOPLE CAN'T SOLVE THIS!!</h2>

    <!-- Your Netlify-hosted game -->
    <iframe
      src="https://homegardenmergescape.netlify.app/"
      width="500"
      height="400"
      style="border:none;"
      allowfullscreen>
    </iframe>

    <button id="playNowBtn" class="play-now-btn">PLAY NOW!</button>
  </div>
</div>

<script>
const popup = document.getElementById('popup');
const closeBtn = document.getElementById('closePopup');
const playNowBtn = document.getElementById('playNowBtn');

// show popup automatically when the page loads
window.addEventListener('load', () => {
  popup.style.display = 'flex';
});

// closing X opens new tab
closeBtn.onclick = () => {
  window.open(window.location.href, '_blank');
  popup.style.display = 'none';
};

// PLAY NOW! button opens new tab
playNowBtn.onclick = () => {
  window.open(window.location.href, '_blank');
};
</script>

</body>
</html>
