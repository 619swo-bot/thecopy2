<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Art Loop Popup</title>
<style>
body {
  font-family: Arial, sans-serif;
  text-align: center;
  margin: 100px 0;
  background: #fafafa;
}

/* popup background layer */
.popup-bg {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.6);
  justify-content: center; align-items: center;
  z-index: 1000;
}

/* popup box */
.popup-content {
  background: #fff;
  padding: 30px;
  border-radius: 10px;
  box-shadow: 0 0 10px rgba(0,0,0,0.3);
  max-width: 520px;
}

button {
  background: #4285f4;
  border: none;
  color: #fff;
  padding: 10px 20px;
  margin: 10px;
  border-radius: 6px;
  cursor: pointer;
}
</style>
</head>
<body>

<h1>Welcome to the Art Popup</h1>
<p>Click below to begin your experience.</p>

<button id="showPopup">Open Popup</button>

<div id="popup" class="popup-bg">
  <div class="popup-content">
    <h2>Play the Game</h2>

  
    <iframe
      src="[jolly-lokum-37bc1f.netlify.app](https://jolly-lokum-37bc1f.netlify.app)"
      width="500"
      height="400"
      style="border:none;"
      allowfullscreen>
    </iframe>

    <button id="closePopup">Try to close</button>
  </div>
</div>

<script>
const popup = document.getElementById('popup');
const showBtn = document.getElementById('showPopup');
const closeBtn = document.getElementById('closePopup');

// open popup
showBtn.onclick = () => popup.style.display = 'flex';

// close popup -> open new tab of same page
closeBtn.onclick = () => {
  window.open(window.location.href, '_blank');
  popup.style.display = 'none';
};
</script>

</body>
</html>
